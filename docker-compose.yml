version: '3.8'

services:
  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "4000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/chatbot-platform
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=changeme_in_production
      - FRONTEND_URL=https://bot.ek21.com
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  mongo_data:
